data:
  output_root: ./outputs
  video_dir: C:\Users\krish\Desktop\etam-memory-bank-gmaw\test_frames
efficienttam:
  cfg: configs/efficienttam/efficienttam_s.yaml
  ckpt: efficient_track_anything/checkpoints/efficienttam_s.pt
output:
  fps: 30
  make_mp4: true
  render_overlays: true
parallel:
  frames_per_part: 1000
  gpus: auto
  max_workers_per_gpu: 1
  overlap: 3
  strategy: fixed_len
postprocess:
  bottom_min_net_drop_px: 8.0
  bottom_stuck_filter: true
  bottom_y_frac: 0.9
  enabled: true
  fall_min_drop_per_frame_px: 0.2
  fall_min_net_drop_px: 20.0
  falling_filter: true
  min_len_frames: 6
  reindex_ids: true
  yoyo_trim: true
run:
  device: auto
  downsample: 1
  save_overlays: true
stage2:
  match_iou: 0.05
  mode: forward_iou
  window: 2
stage3:
  kill_after_gap: 6
  max_skip: 0
  min_px: 2
  overlap_thr: 0.1
  enable_profiling: true
  progress: true
  reuse_existing_outputs: true
  experiment_log_dir: experiment_logs
yolo:
  classes:
    segment_only:
    - 0
    track:
    - 1
  conf: 0.15
  iou: 0.3
  weights: ./yolov11x/best.pt
